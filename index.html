<html>
    <head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Hotel Management
        </title>
        <link rel="stylesheet" href="register.css">
    </head>
    <body>
        <label class="h">Hotel Management</label>
        <div class="container">
        <div class="card1">
            <form id="reg" method="POST">
                <label>Register</label><br><br>
                <input type="text" id="hname" placeholder="Enter Hotel Name" required><br><br>
                <input type="text" id="name" placeholder="Enter Name" required><br><br>
                <input type="text" id="phone" placeholder="Enter Phone NO" required><br><br>
                <input type="email" id="email" placeholder="Enter Email" required><br><br>
                <input type="password" id="pass" placeholder="Enter Password" required><br><br>
                <button type="submit" id="submit">Register</button>
                <button type="reset" id="reset">Cancel</button>
                <p>Already have an Account? </p>
                <a href="login.html" style="text-decoration: none;">login</a><br>
                <p>Register as an Customer</p>
                <a href="customer_reg.html" style="text-decoration: none;">Register</a><br>
            </form>
        </div>
    </div>
    <script src="regh.js"></script>
    </body>
</html>
